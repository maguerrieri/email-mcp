# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# ──────────────────────────────────────────────────────────────────────────────
# email-mcp — GoReleaser configuration (modular fragment system)
#
# Shared (from config/goreleaser/):
#   base.yaml                  – metadata, release.github, snapshot, checksums
#
# Project-specific (inline):
#   builds                     – Skipped (Node.js/TS; Dockerfile handles build)
#   dockers_v2                 – Dual-variant (Debian + Alpine) multi-arch images
#   changelog                  – GitHub-generated release notes with filters
#
# Legacy config preserved at: .goreleaser.yaml.legacy
# ──────────────────────────────────────────────────────────────────────────────
version: 2
project_name: email-mcp

# ── Monorepo (GoReleaser Pro) ────────────────────────────────────────────────
monorepo:
  tag_prefix: email-mcp/
  dir: services/mcp/email-mcp

# ── Shared base ──────────────────────────────────────────────────────────────
includes:
  - from_file:
      path: ../../../config/goreleaser/base.yaml

# ── Build ────────────────────────────────────────────────────────────────────
# No Go builds — this is a Node.js/TypeScript project.
# The Dockerfile handles the full build pipeline (pnpm install → tsc → prune).
builds:
  - skip: true

# ── Docker images (project-specific) ────────────────────────────────────────
# Two variants pushed to dual registries (GHCR + Docker Hub) with custom tag
# schemes, TypeScript build-context extra_files, and OCI labels/annotations.
# Too specific for a shared atom — kept inline.
dockers_v2:
  # ── Debian (slim) — default image ──────────────────────────────────────────
  - id: email-mcp-debian
    dockerfile: Dockerfile
    extra_files:
      - src/
      - package.json
      - pnpm-lock.yaml
      - tsconfig.build.json
      - tsconfig.json
      - biome.json
    images:
      - ghcr.io/codefuturist/email-mcp
      - docker.io/diarmid/email-mcp
    tags:
      - "{{ .Version }}"
      - "{{ .Version }}-bookworm"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}.{{ .Minor }}-bookworm"
      - "{{ .Major }}"
      - "{{ .Major }}-bookworm"
      - bookworm
      - "{{ if not .Prerelease }}latest{{ end }}"
      - "sha-{{ .ShortCommit }}"
      - "ts-{{ .Now.Unix }}"
      - "{{ .Now.Unix }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: email-mcp
      org.opencontainers.image.description: "IMAP/SMTP email MCP server — 47 tools, IMAP IDLE push, multi-account, AI triage"
      org.opencontainers.image.url: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.source: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: LGPL-3.0-or-later
      org.opencontainers.image.vendor: codefuturist
    annotations:
      org.opencontainers.image.description: "IMAP/SMTP email MCP server — 47 tools, IMAP IDLE push, multi-account, AI triage"
      org.opencontainers.image.source: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.licenses: LGPL-3.0-or-later
      org.opencontainers.image.created: "{{ .Date }}"

  # ── Alpine — minimal image ────────────────────────────────────────────────
  - id: email-mcp-alpine
    dockerfile: Dockerfile.alpine
    extra_files:
      - src/
      - package.json
      - pnpm-lock.yaml
      - tsconfig.build.json
      - tsconfig.json
      - biome.json
    images:
      - ghcr.io/codefuturist/email-mcp
      - docker.io/diarmid/email-mcp
    tags:
      - "{{ .Version }}-alpine"
      - "{{ .Major }}.{{ .Minor }}-alpine"
      - "{{ .Major }}-alpine"
      - "{{ if not .Prerelease }}alpine{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: email-mcp
      org.opencontainers.image.description: "IMAP/SMTP email MCP server — 47 tools, IMAP IDLE push, multi-account, AI triage"
      org.opencontainers.image.url: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.source: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: LGPL-3.0-or-later
      org.opencontainers.image.vendor: codefuturist
    annotations:
      org.opencontainers.image.description: "IMAP/SMTP email MCP server — 47 tools, IMAP IDLE push, multi-account, AI triage"
      org.opencontainers.image.source: "https://github.com/codefuturist/email-mcp"
      org.opencontainers.image.licenses: LGPL-3.0-or-later
      org.opencontainers.image.created: "{{ .Date }}"

# ── Changelog (project-specific) ────────────────────────────────────────────
# Uses GitHub-generated release notes (not conventional-commits).
# npm publish and MCP registry handled by release.yml workflow.
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^Merge"
      - "^chore(deps)"
      - "^ci:"
